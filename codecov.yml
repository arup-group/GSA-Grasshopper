codecov:
  notify:
    after_n_builds: 2

comment:
  behavior: new
  layout: "reach, diff, tree"
  show_carryforward_flags: false

coverage:
  precision: 1
  round: down
  range: "30...75"
  status:
    changes: false
    patch: true
    project:
      default:
        target: auto
        threshold: 1%

flags:
  gsagh:
    carryforward: false
  integration:
    carryforward: false

ignore:
  - "**/GsaGHTests/**"
