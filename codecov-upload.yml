parameters:
- name: coverageName
  type: string
- name: searchPath
  type: string
- name: pullRequestNumber
  type: string
  default: ''
- name: uploadStepDisplayName
  type: string
  default: 'Upload coverage to Codecov'
- name: condition
  type: string
  default: 'succeeded()'
- name: continueOnError
  type: boolean
  default: false

steps:
- powershell: |
    # 1. Enforce local installation directory paths for uv
    $uvBinPath = "$env:USERPROFILE\.local\bin"
    if (-not (Test-Path "$uvBinPath\uv.exe")) {
        Write-Host "Installing uv Package Manager..." -ForegroundColor Cyan
        powershell -ExecutionPolicy ByPass -c "irm https://astral.sh | iex"
    }
    if ($env:PATH -notlike "*$uvBinPath*") {
        $env:PATH = "$env:PATH;$uvBinPath"
    }

    # 2. Extract pipeline environment contexts
    $prNum         = $env:PARAM_PULL_REQUEST_NUMBER
    $coverageName  = $env:PARAM_COVERAGE_NAME
    $searchPath    = $env:PARAM_SEARCH_PATH
    $codecovToken  = $env:CODECOV_TOKEN
    $commitSha     = $env:BUILD_SOURCEVERSION
    $branchName    = $env:BUILD_SOURCEBRANCHNAME

    # 3. Validate mandatory parameters before attempting action execution
    if ([string]::IsNullOrWhiteSpace($codecovToken)) {
        Write-Error "CRITICAL: CODECOV_TOKEN environment secret is empty or missing."
        exit 1
    }
    if ([string]::IsNullOrWhiteSpace($coverageName) -or [string]::IsNullOrWhiteSpace($searchPath)) {
        Write-Error "CRITICAL: Required inputs PARAM_COVERAGE_NAME or PARAM_SEARCH_PATH are null."
        exit 1
    }

    Write-Host "Success: Critical pipeline parameters successfully verified." -ForegroundColor Green

    # 4. Locate target Cobertura coverage data asset
    Write-Host "Scanning directory tree for target file under: $searchPath"
    $CoverageFile = Get-ChildItem -Path $searchPath -Filter "coverage.cobertura.xml" -Recurse |
                    Where-Object { $_.FullName -notmatch '\\In\\' } |
                    Select-Object -First 1 -ExpandProperty FullName

    # 5. Run multi-step process uploader using explicit manual git targets
    if ($CoverageFile) {
        Write-Host "Executing multi-step commit preparation and uploading $coverageName from: $CoverageFile"
        uvx --python "3.12" codecov-cli==11.2.6 -v upload-process --fail-on-error --token "$codecovToken" --git-service github --slug "arup-group/GSA-Grasshopper" --disable-search --disable-file-fixes --file "$CoverageFile" --flag "$coverageName" --sha "$commitSha" --branch "$branchName" --pr "$prNum"
    } else {
        Write-Error "CRITICAL: Failed to locate 'coverage.cobertura.xml' under target path tree $searchPath!"
        exit 1
    }
  displayName: ${{ parameters.uploadStepDisplayName }}
  condition: ${{ parameters.condition }}
  continueOnError: ${{ parameters.continueOnError }}
  env:
    CODECOV_TOKEN: $(CODECOV_TOKEN)
    PARAM_PULL_REQUEST_NUMBER: ${{ parameters.pullRequestNumber }}
    PARAM_COVERAGE_NAME: ${{ parameters.coverageName }}
    PARAM_SEARCH_PATH: ${{ parameters.searchPath }}
    BUILD_SOURCEVERSION: $(Build.SourceVersion)
    BUILD_SOURCEBRANCHNAME: $(Build.SourceBranchName)
