parameters:
- name: coverageName
  type: string
- name: searchPath
  type: string
- name: pullRequestNumber
  type: string
  default: ''
- name: uploadStepDisplayName
  type: string
  default: 'Upload coverage to Codecov'


steps:
- bash: |
    set -euo pipefail

    # Normalize Windows backslashes to forward slashes for Git Bash
    search_path="${PARAM_SEARCH_PATH//\\//}"
    coverage_name="$PARAM_COVERAGE_NAME"
    pr_num="${PARAM_PULL_REQUEST_NUMBER:-}"
    codecov_token="$CODECOV_TOKEN"

    # A blank token causes a tokenless upload → Codecov returns 404 "Repository not found".
    if [[ -z "$codecov_token" || "$codecov_token" == *CODECOV_TOKEN* ]]; then
      echo "##[error]CRITICAL: CODECOV_TOKEN missing/unexpanded (len=${#codecov_token}). Is 'grasshopper-public-repos' linked and accessible?"
      exit 1
    fi
    echo "CODECOV_TOKEN present (len=${#codecov_token})."

    # Ensure uv is available
    uv_bin="$HOME/.local/bin"
    if [[ ! -f "$uv_bin/uv.exe" ]]; then
      echo "Installing uv Package Manager..."
      powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"
    fi
    export PATH="$uv_bin:$PATH"

    # Azure PR builds produce a merge commit that doesn't exist on GitHub;
    # use the PR head SHA so the report attaches to the right commit.
    is_pr=false
    if [[ -n "$pr_num" && "$pr_num" != "None" && "$pr_num" != *PullRequestNumber* ]]; then
      is_pr=true
    fi

    pr_args=()
    [[ "$is_pr" == "true" ]] && pr_args=(--pull-request-number "$pr_num")

    echo "Searching for coverage file in: $search_path"
    coverage_file=$(find "$search_path" -name "coverage.cobertura.xml" | grep -v '/In/' | head -1)

    if [[ -z "$coverage_file" ]]; then
      echo "##[error]CRITICAL: Could not locate 'coverage.cobertura.xml' under $search_path!"
      exit 1
    fi

    echo "Uploading $coverage_name from: $coverage_file"

    uvx --python "3.12" "codecov-cli==11.2.6" -v upload-coverage \
      --fail-on-error \
      --token "$codecov_token" \
      --slug "arup-group/GSA-Grasshopper" \
      --git-service github \
      --file "$coverage_file" \
      --disable-search \
      --name "$coverage_name" \
      --flag "$coverage_name" \
      "${pr_args[@]}"
  displayName: ${{ parameters.uploadStepDisplayName }}
  condition: succeeded()
  continueOnError: false
  env:
    CODECOV_TOKEN: $(CODECOV_TOKEN)
    PARAM_PULL_REQUEST_NUMBER: ${{ parameters.pullRequestNumber }}
    PARAM_COVERAGE_NAME: ${{ parameters.coverageName }}
    PARAM_SEARCH_PATH: ${{ parameters.searchPath }}
