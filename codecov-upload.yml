parameters:
- name: coverageName
  type: string
- name: searchPath
  type: string
- name: pullRequestNumber
  type: string
  default: ''
- name: uploadStepDisplayName
  type: string
  default: 'Upload coverage to Codecov'
- name: condition
  type: string
  default: 'succeeded()'
- name: continueOnError
  type: boolean
  default: false

steps:
- powershell: |
    $ErrorActionPreference = "Stop"

    # 1. FORCE CI ENV BYPASS: Wipe background Azure mapping contexts to prevent Codecov's proxy from throwing a 404
    Get-ChildItem Env: | Where-Object { $_.Name -like "BUILD_*" -or $_.Name -like "SYSTEM_*" -or $_.Name -like "AZURE_*" } | ForEach-Object {
        Remove-Item "Env:\$($_.Name)"
    }

    $uvBinPath = "$env:USERPROFILE\.local\bin"
    if (-not (Test-Path "$uvBinPath\uv.exe")) {
        Write-Host "Installing uv Package Manager..."
        powershell -ExecutionPolicy ByPass -c "irm https://astral.sh | iex"
    }
    if ($env:PATH -notlike "*$uvBinPath*") { $env:PATH = "$uvBinPath;$env:PATH" }

    $prNum = $env:PARAM_PULL_REQUEST_NUMBER
    $coverageName = $env:PARAM_COVERAGE_NAME
    $searchPath = $env:PARAM_SEARCH_PATH
    $codecovToken = $env:CODECOV_TOKEN

    if ([string]::IsNullOrWhiteSpace($codecovToken)) { Write-Error "CRITICAL: CODECOV_TOKEN is empty."; exit 1 }
    if ([string]::IsNullOrWhiteSpace($coverageName)) { Write-Error "CRITICAL: PARAM_COVERAGE_NAME is empty."; exit 1 }
    if ([string]::IsNullOrWhiteSpace($searchPath)) { Write-Error "CRITICAL: PARAM_SEARCH_PATH is empty."; exit 1 }

    Write-Host "Searching for coverage file in: $searchPath"
    $CoverageFile = Get-ChildItem -Path $searchPath -Filter "coverage.cobertura.xml" -Recurse | Where-Object { $_.FullName -notmatch '\\In\\' } | Select-Object -First 1 -ExpandProperty FullName

    if (-not $CoverageFile) {
        Write-Error "CRITICAL: Could not locate 'coverage.cobertura.xml' under $searchPath!"
        exit 1
    }

    # 2. FIX MIXED CASING SUGGESTION: Match lower-case structures if Codecov org rules fail matching upper-case
    $repoSlug = "arup-group/gsa-grasshopper"

    # Extract structural PR variables explicitly mapped from pipeline params
    $targetBranch = if ($prNum -and $prNum -ne "0") { "${{ parameters.sourceBranch }}" } else { "main" }
    $targetSha = if ($prNum -and $prNum -ne "0") { "${{ parameters.sourceCommitId }}" } else { "latest" }

    $baseArgs = @(
        "--fail-on-error",
        "--token", $codecovToken,
        "--slug", $repoSlug,
        "--git-service", "github"
    )

    # Set explicit branch fallback definitions
    if (-not [string]::IsNullOrWhiteSpace($targetBranch) -and $targetBranch -notlike "*System.PullRequest*") {
        $baseArgs += @("--branch", $targetBranch)
    }
    if (-not [string]::IsNullOrWhiteSpace($targetSha) -and $targetSha -notlike "*System.PullRequest*") {
        $baseArgs += @("--commit-sha", $targetSha)
    }
    if (-not [string]::IsNullOrWhiteSpace($prNum) -and $prNum -ne "0" -and $prNum -notlike "*System.PullRequest*") {
        Write-Host "Context Target Confirmed: PR #$prNum (Branch: $targetBranch)"
        $baseArgs += @("--pull-request-number", $prNum)
    }

    $uploadArgs = $baseArgs + @(
        "--disable-search",
        "--disable-file-fixes",
        "--file", $CoverageFile,
        "--flag", $coverageName
    )

    Write-Host "Uploading standalone artifact payload to slug: $repoSlug"
    uvx --python "3.12" codecov-cli=="11.2.6" -v do-upload @uploadArgs
    if ($LASTEXITCODE -ne 0) {
        Write-Error "Data upload processing failed with exit code $LASTEXITCODE."
        exit $LASTEXITCODE
    }

  displayName: ${{ parameters.uploadStepDisplayName }}
  condition: ${{ parameters.condition }}
  continueOnError: ${{ parameters.continueOnError }}
  env:
    CODECOV_TOKEN: $(CODECOV_TOKEN)
    PARAM_PULL_REQUEST_NUMBER: ${{ parameters.pullRequestNumber }}
    PARAM_COVERAGE_NAME: ${{ parameters.coverageName }}
    PARAM_SEARCH_PATH: ${{ parameters.searchPath }}
