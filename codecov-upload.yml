parameters:
- name: coverageName
  type: string
- name: searchPath
  type: string
- name: pullRequestNumber
  type: string
  default: ''
- name: uploadStepDisplayName
  type: string
  default: 'Upload coverage to Codecov'
- name: condition
  type: string
  default: 'succeeded()'
- name: continueOnError
  type: boolean
  default: false

steps:
- powershell: |
    $uvBinPath = "$env:USERPROFILE\.local\bin"
    if (-not (Test-Path "$uvBinPath\uv.exe")) {
        Write-Host "Installing uv Package Manager..."
        powershell -ExecutionPolicy ByPass -c "irm https://astral.sh | iex"
    }
    if ($env:PATH -notlike "*$uvBinPath*") { $env:PATH = "$uvBinPath;$env:PATH" }

    $prNum = $env:PARAM_PULL_REQUEST_NUMBER
    $coverageName = $env:PARAM_COVERAGE_NAME
    $searchPath = $env:PARAM_SEARCH_PATH
    $codecovToken = $env:CODECOV_TOKEN

    # checks for mandatory parameters
    if ([string]::IsNullOrWhiteSpace($codecovToken)) {
        Write-Error "CRITICAL: CODECOV_TOKEN is empty or not set."
        exit 1
    }

    $prNum        = $env:PARAM_PULL_REQUEST_NUMBER
    $coverageName = $env:PARAM_COVERAGE_NAME
    $searchPath   = $env:PARAM_SEARCH_PATH
    $codecovToken = $env:CODECOV_TOKEN

    # A blank token makes the CLI do a tokenless upload, which Codecov answers
    # with a misleading 404 "Repository not found" (not 401). Fail loudly first.
    if ([string]::IsNullOrWhiteSpace($codecovToken) -or $codecovToken -match 'CODECOV_TOKEN') {
        Write-Error "CRITICAL: CODECOV_TOKEN missing/unexpanded (len=$($codecovToken.Length)). Is 'grasshopper-public-repos' group linked to this job?"
        exit 1
    }
    Write-Host "CODECOV_TOKEN present (len=$($codecovToken.Length))."

    # Azure PR builds produce a merge commit that doesn't exist on GitHub, so
    # the report won't attach unless we send the actual PR head SHA.
    $isPr = -not [string]::IsNullOrWhiteSpace($prNum) -and $prNum -ne 'None' -and $prNum -notmatch 'PullRequestNumber'
    if ($isPr -and -not [string]::IsNullOrWhiteSpace($env:SYSTEM_PULLREQUEST_SOURCECOMMITID)) {
        $sha    = $env:SYSTEM_PULLREQUEST_SOURCECOMMITID
        $branch = $env:SYSTEM_PULLREQUEST_SOURCEBRANCH -replace '^refs/heads/', ''
    } else {
        $sha    = $env:BUILD_SOURCEVERSION
        $branch = $env:BUILD_SOURCEBRANCH -replace '^refs/heads/', ''
    }

    $PR_ARGS = @()
    if ($isPr) { $PR_ARGS += @("--pull-request-number", $prNum) }

    if ([string]::IsNullOrWhiteSpace($searchPath)) {
        Write-Error "CRITICAL: PARAM_SEARCH_PATH is empty or not set."
        exit 1
    }

    Write-Host "Success: All mandatory environment variables are verified." -ForegroundColor Green

    Write-Host "Searching for coverage file in: $searchPath"
    $CoverageFile = Get-ChildItem -Path $searchPath -Filter "coverage.cobertura.xml" -Recurse | Where-Object { $_.FullName -notmatch '\\In\\' } | Select-Object -First 1 -ExpandProperty FullName

    if ($CoverageFile) {
        Write-Host "Uploading $coverageName from: $CoverageFile (sha=$sha branch=$branch)"

        uvx --python "3.12" codecov-cli=="11.2.6" -v upload-process --fail-on-error --token "$codecovToken" --slug "arup-group/GSA-Grasshopper" --git-service github --sha "$sha" --branch "$branch" --file "$CoverageFile" --disable-search --name "$coverageName" --flag "$coverageName" $PR_ARGS
    } else {
        Write-Error "CRITICAL: Could not locate 'coverage.cobertura.xml' under $searchPath!"
        exit 1
    }
  displayName: ${{ parameters.uploadStepDisplayName }}
  condition: ${{ parameters.condition }}
  continueOnError: ${{ parameters.continueOnError }}
  env:
    CODECOV_TOKEN: $(CODECOV_TOKEN)
    PARAM_PULL_REQUEST_NUMBER: ${{ parameters.pullRequestNumber }}
    PARAM_COVERAGE_NAME: ${{ parameters.coverageName }}
    PARAM_SEARCH_PATH: ${{ parameters.searchPath }}
