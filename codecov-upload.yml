parameters:
  - name: coverageName
    type: string
  - name: searchPath
    type: string
  - name: pullRequestNumber
    type: string
    default: ''
  - name: uploadStepDisplayName
    type: string
    default: 'Upload coverage to Codecov'
  - name: condition
    type: string
    default: 'succeeded()'
  - name: continueOnError
    type: boolean
    default: false

steps:
  - powershell: |
      $ErrorActionPreference = "Stop"

      # 1. Install and configure uv package manager
      $uvBinPath = "$env:USERPROFILE\.local\bin"
      if (-not (Test-Path "$uvBinPath\uv.exe")) {
          Write-Host "Installing uv Package Manager..."
          powershell -ExecutionPolicy ByPass -c "irm https://astral.sh | iex"
      }
      if ($env:PATH -notlike "*$uvBinPath*") { $env:PATH = "$uvBinPath;$env:PATH" }
      Write-Host "##vso[task.prependpath]$uvBinPath"

      # 2. Extract and validate pipeline environment variables
      $prNum = $env:PARAM_PULL_REQUEST_NUMBER
      $coverageName = $env:PARAM_COVERAGE_NAME
      $searchPath = $env:PARAM_SEARCH_PATH
      $codecovToken = $env:CODECOV_TOKEN

      if ([string]::IsNullOrWhiteSpace($codecovToken)) {
          Write-Error "CRITICAL: CODECOV_TOKEN is empty or not set. Check your pipeline library or secret variables."
          exit 1
      }

      # 3. Dynamic Branch Fallback (Resolves the CI 404 Error)
      $TargetBranch = $env:SYSTEM_PULLREQUEST_TARGETBRANCH
      if ([string]::IsNullOrWhiteSpace($TargetBranch)) {
          $TargetBranch = $env:BUILD_SOURCEBRANCHNAME
      }
      $TargetBranch = $TargetBranch -replace "refs/heads/", ""
      Write-Host "Overriding Codecov git branch context to: $TargetBranch"

      # 4. Construct Pull Request arguments array
      $PR_ARGS = @()
      if ([string]::IsNullOrWhiteSpace($prNum) -eq $false -and $prNum -ne "None") {
          $PR_ARGS += "--pull-request-number"
          $PR_ARGS += $prNum
      }

      # 5. Locate coverage report artifact
      Write-Host "Searching for coverage file in: $searchPath"
      $CoverageFile = Get-ChildItem -Path $searchPath -Filter "coverage.cobertura.xml" -Recurse | Where-Object { $_.FullName -notmatch '\\In\\' } | Select-Object -First 1 -ExpandProperty FullName

      # 6. Execute flattened upload command with error-code capture
      if ($CoverageFile) {
          Write-Host "Uploading $coverageName coverage via uvx from: $CoverageFile"

          & uvx --python "3.12" codecov-cli=="11.2.6" -v upload-process --fail-on-error --token "$codecovToken" --slug "arup-group/GSA-Grasshopper" --git-service github --disable-search --branch "$TargetBranch" -f "$CoverageFile" -F "$coverageName" $PR_ARGS

          if ($LASTEXITCODE -ne 0) {
              Write-Error "CRITICAL: uvx codecov-cli execution failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
          }
      } else {
          Write-Error "CRITICAL: Could not locate 'coverage.cobertura.xml' under $searchPath!"
          exit 1
      }
    displayName: ${{ parameters.uploadStepDisplayName }}
    condition: ${{ parameters.condition }}
    continueOnError: ${{ parameters.continueOnError }}
    env:
      CODECOV_TOKEN: $(CODECOV_TOKEN)
      PARAM_PULL_REQUEST_NUMBER: ${{ parameters.pullRequestNumber }}
      PARAM_COVERAGE_NAME: ${{ parameters.coverageName }}
      PARAM_SEARCH_PATH: ${{ parameters.searchPath }}
      SYSTEM_PULLREQUEST_TARGETBRANCH: $(System.PullRequest.TargetBranch)
      BUILD_SOURCEBRANCHNAME: $(Build.SourceBranchName)
